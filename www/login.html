<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Inventory System</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Login page: static HTML form only, no JavaScript behavior -->
    <main class="form-shell">
        <h1>Login</h1>
        <form action="/login" method="POST">
            <input type="hidden" id="login-redirect" name="redirect" value="" />
            <label>Username<input type="text" name="username" required /></label>
            <label>Password<input type="password" name="password" required /></label>
            <button type="submit">Sign In</button>
            <div class="form-footer">
                <a href="register.html">Create an account</a>
                <a href="index.html">Back to home</a>
            </div>
        </form>
        <p class="alert">{{MESSAGE}}</p>
    </main>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            const redirectInput = document.getElementById('login-redirect');
            if (redirectInput && redirect) {
                redirectInput.value = redirect;
            }

            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function() {
                    if (redirectInput && redirectInput.value) {
                        redirectInput.value = redirectInput.value.replace(/[^a-zA-Z0-9._\/-]/g, '');
                    }
                });
            }
        })();
    </script>
</body>
</html>
