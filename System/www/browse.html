<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Books</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="browse">
    <header class="app-bar">
        <h1>Browse Books</h1>
        <div class="top-actions">
            <a class="button secondary" href="index.html">Home</a>
            <a class="button" href="login.html">Login</a>
        </div>
    </header>
    <main class="page-shell">
        <section class="section-panel">
            <h2>Available Library Catalog</h2>
            <p>Visitors can view the full book list and see which titles are available or borrowed.</p>
        </section>
        <section class="section-panel">
            <form id="browseSearch" class="search-panel">
                <input type="text" name="query" placeholder="Search title, author, category" />
                <select name="status">
                    <option value="">All statuses</option>
                    <option value="available">Available</option>
                    <option value="borrowed">Borrowed</option>
                </select>
                <button type="submit">Search</button>
            </form>
        </section>
        <section class="section-panel">
            <div id="browseResults" class="card-grid"></div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
