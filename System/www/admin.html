<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
    <header class="app-bar">
        <h1>Admin Dashboard</h1>
        <div class="top-actions">
            <span id="currentAdmin"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </header>
    <main class="admin-shell">
        <section class="section-panel">
            <h2>Add New Book</h2>
            <form id="addBookForm">
                <label>Title<input type="text" name="title" required /></label>
                <label>Author<input type="text" name="author" required /></label>
                <label>Category<input type="text" name="category" required /></label>
                <button type="submit">Add Book</button>
            </form>
            <p id="adminMessage" class="alert"></p>
        </section>
        <section class="section-panel" id="adminSummary">
            <h2>Report</h2>
            <div id="summaryGrid" class="summary-grid"></div>
        </section>
        <section class="section-panel">
            <h2>Book Inventory</h2>
            <div id="bookList" class="card-grid"></div>
        </section>
        <section class="section-panel">
            <h2>Audit Log</h2>
            <div id="auditLog" class="audit-list"></div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
