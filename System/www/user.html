<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Account</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="user">
    <header class="app-bar">
        <h1>Borrower Account</h1>
        <div class="top-actions">
            <span id="welcomeUser"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </header>
    <main class="user-shell">
        <section class="section-panel user-status">
            <div>
                <h2>Credit Score</h2>
                <p id="creditScore">--</p>
            </div>
            <div>
                <h2>Due Alerts</h2>
                <p id="overdueCount">--</p>
            </div>
            <div>
                <h2>Account Status</h2>
                <p id="accountStatus">--</p>
            </div>
        </section>
        <section class="section-panel">
            <h2>Search & Reserve Books</h2>
            <form id="searchForm" class="search-panel">
                <input type="text" name="query" placeholder="Search title, author, category" />
                <select name="status">
                    <option value="">All statuses</option>
                    <option value="available">Available</option>
                    <option value="borrowed">Borrowed</option>
                </select>
                <button type="submit">Search</button>
            </form>
            <div id="searchResults" class="card-grid"></div>
        </section>
        <section class="section-panel">
            <h2>Borrowed Books</h2>
            <div id="borrowedBooks" class="card-grid"></div>
        </section>
        <section class="section-panel">
            <h2>Notifications</h2>
            <div id="notifications" class="notification-list"></div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
